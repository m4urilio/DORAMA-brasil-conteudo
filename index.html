<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorama Brasil | Streaming de Doramas</title>
    <meta name="description" content="Assista aos melhores doramas legendados em portugues. Sua plataforma favorita de doramas coreanos, chineses e japoneses.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
        <div class="loader">
            <div class="loader-spinner"></div>
            <p>Carregando doramas...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="#" class="logo">
                <span class="logo-icon">&#127800;</span>
                <span class="logo-text">Dorama<span class="logo-accent">Brasil</span></span>
            </a>

            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
                    <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar doramas..." autocomplete="off">
                <div id="search-results" class="search-results"></div>
            </div>

            <div class="nav-links" id="nav-links">
                <a href="#em-destaque">Destaque</a>
                <a href="#mais-assistidos">Mais Assistidos</a>
                <a href="#todos">Todos</a>
            </div>

            <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <!-- Hero Banner -->
    <section class="hero" id="hero">
        <div class="hero-bg" id="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content container">
            <span class="hero-badge">&#10024; Em Destaque</span>
            <h1 class="hero-title" id="hero-title">Carregando...</h1>
            <p class="hero-channel" id="hero-channel"></p>
            <button class="hero-btn" id="hero-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Assistir Agora
            </button>
        </div>
    </section>

    <!-- Em Destaque -->
    <section class="section" id="em-destaque">
        <div class="container">
            <h2 class="section-title"><span class="section-icon">&#11088;</span> Em Destaque</h2>
            <div class="carousel-wrapper">
                <button class="carousel-btn carousel-btn-left" data-target="featured-carousel" data-dir="-1" aria-label="Anterior">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="carousel" id="featured-carousel"></div>
                <button class="carousel-btn carousel-btn-right" data-target="featured-carousel" data-dir="1" aria-label="Proximo">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </section>

    <!-- Mais Assistidos -->
    <section class="section" id="mais-assistidos">
        <div class="container">
            <h2 class="section-title"><span class="section-icon">&#128293;</span> Mais Assistidos</h2>
            <div class="carousel-wrapper">
                <button class="carousel-btn carousel-btn-left" data-target="popular-carousel" data-dir="-1" aria-label="Anterior">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="carousel" id="popular-carousel"></div>
                <button class="carousel-btn carousel-btn-right" data-target="popular-carousel" data-dir="1" aria-label="Proximo">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </section>

    <!-- Todos os Doramas -->
    <section class="section" id="todos">
        <div class="container">
            <h2 class="section-title"><span class="section-icon">&#127916;</span> Todos os Doramas</h2>
            <div class="grid" id="all-grid"></div>
        </div>
    </section>

    <!-- Modal Player -->
    <div class="modal" id="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-container">
            <button class="modal-close" aria-label="Fechar">&#10005;</button>
            <div class="modal-player">
                <iframe id="player-iframe" src="" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
            <div class="modal-body">
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-channel" id="modal-channel"></p>
            </div>
            <div class="modal-suggestions">
                <h3>Voce tambem pode gostar</h3>
                <div class="suggestions-row" id="suggestions-row"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <span class="logo-icon">&#127800;</span>
                <span class="logo-text">Dorama<span class="logo-accent">Brasil</span></span>
            </div>
            <p class="footer-text">Sua plataforma favorita de doramas legendados</p>
            <p class="footer-copy">&copy; 2026 Dorama Brasil. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
